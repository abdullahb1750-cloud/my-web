<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Parallax Camera Pan Effect</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #0f172a;
            overflow-x: hidden;
            font-family: system-ui, sans-serif;
        }

        /* Creates a long page to allow for scrolling */
        .scroll-container {
            height: 300vh;
            position: relative;
        }

        .title {
            color: #94a3b8;
            text-align: center;
            padding-top: 15vh;
            font-size: 1.25rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Sticky viewport holding our 2D graphic */
        .viewport {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        /* The Box SVG wrapper */
        .box-wrapper {
            width: 300px;
            height: 300px;
            will-change: transform;
        }

        /* Target individual layers of the 2D SVG for the pan effect */
        .top-face, .sides {
            will-change: transform;
            transition: transform 0.1s ease-out;
        }
    </style>
</head>
<body>

    <div class="scroll-container">
        <h1 class="title">Scroll down to pan camera</h1>

        <div class="viewport">
            <div class="box-wrapper" id="boxWrapper">
                <svg viewBox="0 0 100 100" width="100%" height="100%">
                    <g class="sides" id="boxSides">
                        <polygon points="20,40 50,55 50,85 20,70" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
                        <polygon points="50,55 80,40 80,70 50,85" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
                    </g>
                    
                    <g class="top-face" id="boxTop">
                        <polygon points="50,25 80,40 50,55 20,40" fill="#38bdf8" opacity="0.85" stroke="#0ea5e9" stroke-width="0.5"/>
                    </g>
                </svg>
            </div>
        </div>
    </div>

    <script>
        const boxWrapper = document.getElementById('boxWrapper');
        const boxTop = document.getElementById('boxTop');
        const boxSides = document.getElementById('boxSides');

        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;

            // 1. Move the entire box upward as you scroll
            boxWrapper.style.transform = `translateY(${-scrollY * 0.5}px)`;

            // 2. The Parallax Magic: 
            // Pushing the "top lid" downwards slightly faster than the rest of the box
            // changes the 2D perspective line, mimicking a camera panning downward.
            const panFactor = scrollY * 0.04; 
            boxTop.style.transform = `translateY(${panFactor}px)`;
            
            // Slightly compress the sides to simulate an shifting viewing angle
            boxSides.style.transform = `scaleY(${1 - (scrollY * 0.0002)})`;
        });
    </script>
</body>
</html>
