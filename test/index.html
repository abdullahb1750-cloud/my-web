<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Isometric Cube Scroll</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #1a1a2e;
            overflow-x: hidden;
            font-family: sans-serif;
        }

        /* Creates the scrolling space */
        .scroll-space {
            height: 300vh;
            position: relative;
        }

        /* Fixed viewport so the flat graphic stays on screen */
        .viewport-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        /* The 2D SVG Box container */
        .box-container {
            width: 200px;
            height: 200px;
            will-change: transform;
            transition: transform 0.1s ease-out; /* Smooths out the scroll */
        }

        .text-hint {
            color: #fff;
            text-align: center;
            padding-top: 25vh;
            letter-spacing: 1px;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="scroll-space">
        <h1 class="text-hint">Scroll down to pan the "camera" past the box</h1>

        <div class="viewport-layer">
            <div class="box-container" id="box">
                <svg viewBox="0 0 100 100" width="100%" height="100%">
                    <polygon points="50,15 85,35 50,55 15,35" fill="#0f4c81" opacity="0.9"/>
                    <polygon points="15,35 50,55 50,90 15,70" fill="#1f3a60"/>
                    <polygon points="50,55 85,35 85,70 50,90" fill="#162c4e"/>
                </svg>
            </div>
        </div>
    </div>

    <script>
        const box = document.getElementById('box');

        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            
            // Moves the 2D box straight up on the Y-axis as you scroll down
            box.style.transform = `translateY(${-scrollY * 0.7}px)`;
        });
    </script>
</body>
</html>
