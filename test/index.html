<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS 3D SVG Layers</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #1a1a1a;
      margin: 0;
    }

    .scene {
      width: 300px;
      height: 300px;
      /* Establish 3D space */
      perspective: 1000px; 
    }

    .svg-container {
      width: 100%;
      height: 100%;
      /* Preserve 3D for child elements */
      transform-style: preserve-3d;
      /* Tilt the whole SVG to see the 3D effect */
      transform: rotateX(55deg) rotateZ(45deg);
      transition: transform 0.5s ease;
    }

    .svg-container:hover {
      transform: rotateX(45deg) rotateZ(20deg);
    }

    /* Target specific groups in the SVG and move them on the Z-axis */
    #layer-bottom { transform: translateZ(0px); }
    #layer-middle { transform: translateZ(40px); }
    #layer-top { transform: translateZ(80px); }

    /* Optional: Add drop shadows to emphasize depth */
    g {
      filter: drop-shadow(0px 10px 10px rgba(0,0,0,0.5));
    }
  </style>
</head>
<body>

  <div class="scene">
    <svg class="svg-container" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <g id="layer-bottom">
        <rect x="10" y="10" width="180" height="180" fill="#3498db" rx="15"/>
      </g>
      
      <g id="layer-middle">
        <circle cx="100" cy="100" r="60" fill="#e74c3c"/>
      </g>
      
      <g id="layer-top">
        <polygon points="100,50 140,140 60,140" fill="#f1c40f"/>
      </g>
    </svg>
  </div>

</body>
</html>
