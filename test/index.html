<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed 2D Camera Pan Physics</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #0f172a;
            overflow-x: hidden;
            font-family: system-ui, sans-serif;
        }

        .scroll-container {
            height: 300vh;
            position: relative;
        }

        .title {
            color: #94a3b8;
            text-align: center;
            padding-top: 15vh;
            font-size: 1.25rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .viewport {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        .box-wrapper {
            width: 300px;
            height: 300px;
        }
    </style>
</head>
<body>

    <div class="scroll-container">
        <h1 class="title">Scroll down: Fixed Pan Physics</h1>

        <div class="viewport">
            <div class="box-wrapper">
                <svg viewBox="0 0 100 100" width="100%" height="100%">
                    <polygon id="leftWall" fill="#1e293b" stroke="#334155" stroke-width="0.3"/>
                    <polygon id="rightWall" fill="#0f172a" stroke="#334155" stroke-width="0.3"/>
                    <polygon id="topLid" fill="#38bdf8" opacity="0.9" stroke="#0ea5e9" stroke-width="0.3"/>
                </svg>
            </div>
        </div>
    </div>

    <script>
        // Target our 2D SVG shapes
        const topLid = document.getElementById('topLid');
        const leftWall = document.getElementById('leftWall');
        const rightWall = document.getElementById('rightWall');

        function updateBoxPerspective() {
            const scrollY = window.scrollY;
            
            // Normalize scroll progress between 0 and 1
            const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
            const progress = Math.min(scrollY / maxScroll, 1);

            // Dynamic Geometry calculations based on scroll
            // As the camera moves down, the 'horizon line' of the cube shifts up.
            const centerY = 50 - (progress * 15); // Global height translation
            const lidThickness = 15 - (progress * 10); // Lid narrows as camera matches its height
            const wallBottom = 85 - (progress * 5); // Bottom adjusts to perspective angle

            // Fixed X coordinates for standard isometric proportions
            const leftX = 20;
            const centerX = 50;
            const rightX = 80;

            // Calculate precise shared vertex points
            const ptTop = `${centerX},${centerY - lidThickness}`;
            const ptLeft = `${leftX},${centerY}`;
            const ptCenter = `${centerX},${centerY + lidThickness}`;
            const ptRight = `${rightX},${centerY}`;
            
            const ptBottomLeft = `${leftX},${wallBottom}`;
            const ptBottomCenter = `${centerX},${wallBottom + lidThickness}`;
            const ptBottomRight = `${rightX},${wallBottom}`;

            // Map points cleanly back to the 2D SVG polygons without breaking structural integrity
            topLid.setAttribute('points', `${ptTop} ${ptRight} ${ptCenter} ${ptLeft}`);
            leftWall.setAttribute('points', `${ptLeft} ${ptCenter} ${ptBottomCenter} ${ptBottomLeft}`);
            rightWall.setAttribute('points', `${ptCenter} ${ptRight} ${ptBottomRight} ${ptBottomCenter}`);
        }

        // Run on scroll and initial render
        window.addEventListener('scroll', updateBoxPerspective);
        updateBoxPerspective();
    </script>
</body>
</html>
