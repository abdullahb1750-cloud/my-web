<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic SVG Hex Column Pan Physics</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #0b0f19;
            overflow-x: hidden;
            font-family: system-ui, sans-serif;
        }

        .scroll-container {
            height: 300vh;
            position: relative;
        }

        .title {
            color: #64748b;
            text-align: center;
            padding-top: 12vh;
            font-size: 1rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .viewport {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        .shape-wrapper {
            width: 320px;
            height: 320px;
        }
    </style>
</head>
<body>

    <div class="scroll-container">
        <h1 class="title">Scrolling Custom Prism Pan Physics</h1>

        <div class="viewport">
            <div class="shape-wrapper">
                <svg viewBox="0 0 100 100" width="100%" height="100%">
                    <polygon id="leftPanel" fill="#1e1b4b" stroke="#312e81" stroke-width="0.3"/>
                    <polygon id="midPanel" fill="#2e1065" stroke="#4c1d95" stroke-width="0.3"/>
                    <polygon id="rightPanel" fill="#4c1d95" stroke="#5b21b6" stroke-width="0.3"/>
                    
                    <polygon id="topCap" fill="#a78bfa" opacity="0.95" stroke="#c084fc" stroke-width="0.3"/>
                </svg>
            </div>
        </div>
    </div>

    <script>
        // DOM Elements
        const topCap = document.getElementById('topCap');
        const leftPanel = document.getElementById('leftPanel');
        const midPanel = document.getElementById('midPanel');
        const rightPanel = document.getElementById('rightPanel');

        function updatePrismPerspective() {
            const scrollY = window.scrollY;
            const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
            const progress = Math.min(scrollY / maxScroll, 1);

            // 1. Perspective Variables (Physics Drivers)
            // As camera drops, the shape moves up, the cap flattens, and the base angle shifts
            const centerY = 45 - (progress * 15); 
            const capFlatten = 14 - (progress * 10); 
            const lengthY = 35 + (progress * 5); // Bottom perspective stretches slightly

            // Fixed X Coordinates for a regular hexagon's points
            const xFarLeft  = 20;
            const xMidLeft  = 35;
            const xMidRight = 65;
            const xFarRight = 80;

            // 2. Compute Mathematical Vertices for the Top Hexagon Cap
            const t1 = `${xMidLeft},${centerY - capFlatten}`;   // Top-Left Back
            const t2 = `${xMidRight},${centerY - capFlatten}`;  // Top-Right Back
            const t3 = `${xFarRight},${centerY}`;              // Top-Far Right
            const t4 = `${xMidRight},${centerY + capFlatten}`;  // Top-Right Front Seam
            const t5 = `${xMidLeft},${centerY + capFlatten}`;   // Top-Left Front Seam
            const t6 = `${xFarLeft},${centerY}`;               // Top-Far Left

            // 3. Compute Matching Bottom Vertices (Perfect Parallel Offsets)
            const b3 = `${xFarRight},${centerY + lengthY}`;
            const b4 = `${xMidRight},${centerY + capFlatten + lengthY}`;
            const b5 = `${xMidLeft},${centerY + capFlatten + lengthY}`;
            const b6 = `${xFarLeft},${centerY + lengthY}`;

            // 4. Inject Coordinates to update the SVG structure safely
            // Top Cap Hexagon
            topCap.setAttribute('points', `${t1} ${t2} ${t3} ${t4} ${t5} ${t6}`);

            // Front-Left Wall Panel
            leftPanel.setAttribute('points', `${t6} ${t5} ${b5} ${b6}`);

            // Front-Middle Wall Panel
            midPanel.setAttribute('points', `${t5} ${t4} ${b4} ${b5}`);

            // Front-Right Wall Panel
            rightPanel.setAttribute('points', `${t4} ${t3} ${b3} ${b4}`);
        }

        // Event Hookups
        window.addEventListener('scroll', updatePrismPerspective);
        updatePrismPerspective(); // Run once initially
    </script>
</body>
</html>
