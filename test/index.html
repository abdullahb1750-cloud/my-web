<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Car Perspective Pan</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #b5a499; /* Matches your image background color */
            overflow-x: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        .scroll-space {
            height: 300vh; /* Long scroll track */
            position: relative;
        }

        .ui-header {
            position: fixed;
            top: 20px;
            width: 100%;
            text-align: center;
            font-weight: bold;
            font-size: 1.5rem;
            color: #1a1a1a;
            letter-spacing: 2px;
            z-index: 10;
        }

        /* Fixed Viewport Box */
        .viewport-window {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw;
            max-width: 800px;
            height: 400px;
            background-color: #c4b5a9;
            border: 3px solid #1a1a1a;
            border-radius: 8px;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.15);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Camera Frame Rig */
        .camera-rig {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            will-change: transform;
        }

        /* The Car Graphic Wrapper */
        .car-container {
            position: relative;
            width: 500px;
            height: auto;
            will-change: transform;
        }

        /* Standardized layout for layers */
        .car-layer {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Artificial ground reflection/shadow layer */
        .ground-shadow {
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 100%;
            height: 15px;
            background: rgba(0, 0, 0, 0.4);
            filter: blur(4px);
            border-radius: 50%;
            z-index: -1;
            will-change: transform;
        }

        .scroll-hint {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: #2b2b2b;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="scroll-space">
        <div class="ui-header">PIXEL PAN PERSPECTIVE</div>

        <div class="viewport-window">
            <div class="camera-rig" id="cameraRig">
                <div class="car-container" id="carContainer">
                    
                    <div class="ground-shadow" id="carShadow"></div>
                    
                    <img class="car-layer" id="carBody" src="https://i.imgur.com/vH9M47p.png" alt="Pixel Wagon Profile" onerror="this.src='https://images.unsplash.com/photo-1552519507-da3b142c6e3d?q=80&w=600&auto=format&fit=crop'; this.style.borderRadius='8px';">
                    
                </div>
            </div>
            <div class="scroll-hint">[scroll mouse to pan camera perspective]</div>
        </div>
    </div>

    <script>
        const cameraRig = document.getElementById('cameraRig');
        const carContainer = document.getElementById('carContainer');
        const carShadow = document.getElementById('carShadow');

        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
            const progress = Math.min(scrollY / maxScroll, 1);

            // 1. Rig Pan Math: Simulated sweeping track movement
            // Moves the scene left-to-right diagonally while zooming slightly
            const panX = (progress * 120) - 60;   // Sweeps -60px to +60px
            const panY = (progress * -30) + 15;   // Drops camera down vertically
            const scaleZ = 1 + (progress * 0.15); // Slight dynamic lens zoom

            cameraRig.style.transform = `translateX(${panX}px) translateY(${panY}px) scale(${scaleZ})`;

            // 2. Parallax Illusion Matrix:
            // Slighting skew and rotate the chassis relative to its shadow to fake the 3D angle warp
            const rotationY = (progress * -15) + 7.5; // Rotate angle slightly along the Z-plane
            const skewX = (progress * 6) - 3;         // Fake isometric perspective drift
            
            carContainer.style.transform = `rotateY(${rotationY}deg) skewX(${skewX}deg)`;
            
            // Counter-adjust shadow so it stays flat on the surface floor
            carShadow.style.transform = `translateX(${-panX * 0.2}px) scaleX(${1 + progress * 0.1})`;
        });
    </script>
</body>
</html>
