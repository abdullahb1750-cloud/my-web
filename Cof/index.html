<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Cube Scroll Effect</title>
    <style>
        /* Reset basic margins and hide horizontal scrollbar */
        body, html {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background-color: #111;
        }

        /* The canvas will be fixed in the background */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        /* Create a tall container to force the browser to scroll */
        .scroll-container {
            height: 400vh; /* 4 times the height of the screen */
            width: 100%;
        }

        /* Simple text styling */
        .instructions {
            color: white;
            font-family: sans-serif;
            text-align: center;
            margin-top: 50vh;
            font-size: 1.5rem;
            letter-spacing: 2px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="scroll-container">
        <div class="instructions">Scroll down to move camera ↓</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // 1. Setup Scene, Camera, and Renderer
        const scene = new THREE.Scene();
        
        // Field of view, aspect ratio, near clipping plane, far clipping plane
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Create the 3D Cube
        const geometry = new THREE.BoxGeometry(2, 2, 2);
        
        // MeshNormalMaterial maps the normal vectors to RGB colors (looks cool without lighting)
        const material = new THREE.MeshNormalMaterial({ wireframe: false });
        const cube = new THREE.Mesh(geometry, material);
        scene.add(cube);

        // Add white edges to make the cube shape more distinct
        const edges = new THREE.EdgesGeometry(geometry);
        const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 2 }));
        cube.add(line);

        // Pull the camera back so we can see the cube
        camera.position.z = 5;

        // 3. Animation Loop (constantly renders the scene)
        function animate() {
            requestAnimationFrame(animate);

            // Add a slow continuous rotation to make it feel alive
            cube.rotation.x += 0.005;
            cube.rotation.y += 0.005;

            renderer.render(scene, camera);
        }
        animate();

        // 4. Handle Scrolling (The Camera Movement)
        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            
            // Move camera down on the Y axis as you scroll down.
            // (Moving camera down makes the cube appear to move up)
            camera.position.y = -scrollY * 0.01; 
            
            // Optional: If you want the camera to also zoom in/out or move horizontally
            // camera.position.z = 5 + (scrollY * 0.005); 
        });

        // 5. Handle Window Resizing
        window.addEventListener('resize', () => {
            // Update camera aspect ratio and renderer size when window size changes
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
