<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E30 2D Scene</title>
<style>
  /* Base Reset & Variables */
  body, html {
    margin: 0;
    padding: 0;
    overflow-x: hidden;
    background-color: #87CEEB; /* Sky Blue */
    transition: background-color 0.8s ease-out;
  }

  /* This container provides the actual scrolling length to the webpage */
  .scroll-space {
    height: 250vh; 
  }

  /* The Camera acts as the fixed viewport window */
  .camera {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  /* The World contains the above-ground and underground layers */
  .world {
    position: absolute;
    width: 100%;
    height: 200vh; /* 100vh for above ground, 100vh for underground */
    top: 0;
    transition: transform 0.1s linear;
  }

  /* --- ABOVE GROUND SCENE --- */
  .above-ground {
    height: 100vh;
    position: relative;
  }

  /* Sky and Moving Clouds */
  .sky {
    height: 60vh;
    position: relative;
  }
  .cloud {
    position: absolute;
    background: #ffffff;
    border-radius: 50px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.05);
  }
  .cloud::before, .cloud::after {
    content: '';
    position: absolute;
    background: #ffffff;
    border-radius: 50%;
  }
  .cloud1 {
    width: 120px; height: 40px; top: 15%;
    animation: drift 25s linear infinite;
  }
  .cloud1::before { width: 60px; height: 60px; top: -30px; left: 15px; }
  .cloud1::after { width: 40px; height: 40px; top: -15px; right: 15px; }

  .cloud2 {
    width: 160px; height: 50px; top: 35%; opacity: 0.8;
    animation: drift 40s linear infinite;
  }
  .cloud2::before { width: 70px; height: 70px; top: -35px; left: 20px; }
  .cloud2::after { width: 50px; height: 50px; top: -20px; right: 25px; }

  @keyframes drift {
    0% { left: -200px; }
    100% { left: 100vw; }
  }

  /* Ground and Road */
  .ground {
    height: 40vh;
    background: #4caf50; /* Grass green */
    border-top: 6px solid #2e7d32;
    position: relative;
  }
  .road {
    height: 20vh;
    background: #424242; /* Asphalt */
    position: absolute;
    bottom: 5vh;
    width: 100%;
    border-top: 3px solid #757575;
    border-bottom: 3px solid #757575;
  }
  .road-lines {
    width: 100%;
    border-top: 5px dashed #ffffff;
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
  }

  /* --- BMW E30 CSS ART --- */
  .e30 {
    position: absolute;
    bottom: 18vh; /* Parked on the side/grass edge */
    left: 20vw;
    width: 260px;
    height: 80px;
    z-index: 10;
  }
  
  /* Boxy classic chassis */
  .car-body {
    position: absolute;
    bottom: 20px;
    width: 260px;
    height: 45px;
    background: #d32f2f; /* Classic red */
    border-radius: 5px 20px 5px 5px;
    box-shadow: inset 0 -10px 0 rgba(0,0,0,0.2);
  }
  .car-top {
    position: absolute;
    bottom: 65px;
    left: 60px;
    width: 110px;
    height: 30px;
    background: #d32f2f;
    border-radius: 10px 5px 0 0;
  }
  .windows {
    position: absolute;
    bottom: 65px;
    left: 65px;
    width: 100px;
    height: 25px;
    background: #e0f7fa;
    border-radius: 8px 3px 0 0;
  }
  .pillar {
    position: absolute;
    bottom: 65px;
    left: 110px;
    width: 10px;
    height: 25px;
    background: #d32f2f;
  }
  
  /* Wheels */
  .wheel {
    position: absolute;
    bottom: 5px;
    width: 45px;
    height: 45px;
    background: #111;
    border-radius: 50%;
    border: 4px solid #bdbdbd; /* Alloys */
    box-shadow: inset 0 0 10px #000;
  }
  .wheel.front { left: 35px; }
  .wheel.rear { right: 40px; }

  /* Blinker & Animation */
  .blinker {
    position: absolute;
    bottom: 45px;
    left: 8px; /* Front side marker */
    width: 12px;
    height: 8px;
    background: #ff9800;
    border-radius: 3px;
    animation: blink 0.5s infinite alternate;
  }

  @keyframes blink {
    0%, 20% { opacity: 0; box-shadow: none; }
    80%, 100% { opacity: 1; box-shadow: 0 0 15px 5px rgba(255, 152, 0, 0.8); }
  }

  /* --- UNDERGROUND SCENE --- */
  .underground {
    height: 100vh;
    background: #0f0f0f;
    position: relative;
    border-top: 15px solid #3e2723; /* Dirt crust */
  }
  
  .dirt-texture {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background-image: radial-gradient(#221 1px, transparent 1px);
    background-size: 20px 20px;
    opacity: 0.3;
  }
  .roots {
    position: absolute;
    top: 0; left: 25vw; width: 5px; height: 100px;
    background: #5d4037;
    border-radius: 0 0 10px 10px;
  }

</style>
</head>
<body>

  <div class="scroll-space"></div>

  <div class="camera">
    <div class="world" id="world">
      
      <div class="above-ground">
        <div class="sky">
          <div class="cloud cloud1"></div>
          <div class="cloud cloud2"></div>
        </div>
        <div class="ground">
          <div class="road">
            <div class="road-lines"></div>
          </div>
          
          <div class="e30">
            <div class="car-top"></div>
            <div class="windows"></div>
            <div class="pillar"></div>
            <div class="car-body"></div>
            <div class="blinker"></div>
            <div class="wheel front"></div>
            <div class="wheel rear"></div>
          </div>
        </div>
      </div>

      <div class="underground">
        <div class="dirt-texture"></div>
        <div class="roots"></div>
        <div class="roots" style="left: 70vw; height: 150px; width: 8px;"></div>
      </div>

    </div>
  </div>

  <script>
    // Logic to move the camera down (world up) on scroll
    window.addEventListener('scroll', () => {
      const scrollY = window.scrollY;
      
      // Calculate how far down the page the user has scrolled
      const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
      const scrollFraction = scrollY / maxScroll;

      // Translate the world layer up (Max 100vh to fully show the underground)
      const world = document.getElementById('world');
      world.style.transform = `translateY(-${scrollFraction * 100}vh)`;

      // Turn the background black when the camera dips beneath the surface
      if (scrollFraction > 0.4) {
        document.body.style.backgroundColor = '#0f0f0f';
      } else {
        document.body.style.backgroundColor = '#87CEEB';
      }
    });
  </script>
</body>
</html>
