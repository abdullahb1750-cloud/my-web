<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS 3D Cube Scroll</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #111;
            overflow-x: hidden;
        }

        /* 400% height to force scrolling */
        .scroll-container {
            height: 400vh;
            position: relative;
        }

        /* The 3D viewport wrapper fixed to the screen */
        .viewport {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 800px; /* Gives the 3D depth effect */
            pointer-events: none;
        }

        /* The Cube container */
        .cube {
            position: relative;
            width: 200px;
            height: 200px;
            transform-style: preserve-3d;
            transform: rotateX(-20deg) rotateY(30deg);
            will-change: transform;
        }

        /* Style for all faces */
        .face {
            position: absolute;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #00ffcc;
            box-shadow: inset 0 0 20px rgba(0, 255, 255, 0.2);
        }

        /* Position each face in 3D space */
        .front  { transform: translateZ(100px); }
        .back   { transform: rotateY(180deg) translateZ(100px); }
        .left   { transform: rotateY(-90deg) translateZ(100px); }
        .right  { transform: rotateY(90deg) translateZ(100px); }
        .top    { transform: rotateX(90deg) translateZ(100px); }
        .bottom { transform: rotateX(-90deg) translateZ(100px); }

        .text {
            color: white;
            font-family: sans-serif;
            text-align: center;
            padding-top: 20vh;
        }
    </style>
</head>
<body>

    <div class="scroll-container">
        <h1 class="text">Scroll Down to Move Cube</h1>
        
        <div class="viewport">
            <div class="cube" id="cube">
                <div class="face front"></div>
                <div class="face back"></div>
                <div class="face left"></div>
                <div class="face right"></div>
                <div class="face top"></div>
                <div class="face bottom"></div>
            </div>
        </div>
    </div>

    <script>
        const cube = document.getElementById('cube');

        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            
            // This spins the cube AND moves it upward (simulating a camera moving down)
            cube.style.transform = `
                translateY(${-scrollY * 0.4}px) 
                rotateX(${-20 + scrollY * 0.1}deg) 
                //rotateY(${30 + scrollY * 0.1}deg)
            `;
        });
    </script>
</body>
</html>
